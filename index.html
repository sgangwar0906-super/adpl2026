<!-- index.html -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ADPL 2026 · Elite Fantasy Cricket League</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300..800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Additional styles for enhanced leaderboard */
    .selector-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      background: var(--surface-glass);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 0.6rem 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255,215,0,0.3);
    }
    .current-badge {
      font-weight: 700;
      background: var(--accent-glow);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      font-size: 0.9rem;
    }
    .date-selector {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--accent-primary);
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
      color: var(--text-primary);
      font-weight: 600;
      cursor: pointer;
    }
    .leaderboard-wrapper {
      background: var(--surface-glass);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.8rem;
      margin: 1rem 0;
    }
    .table-responsive {
      overflow-x: auto;
    }
    #leaderboard {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
    }
    #leaderboard thead th {
      font-size: 0.9rem;
      font-weight: 700;
      padding: 1rem 0.8rem;
      background: rgba(0,0,0,0.3);
      border-radius: 1rem;
      color: var(--accent-secondary);
      text-transform: uppercase;
    }
    #leaderboard tbody tr {
      background: var(--card-bg);
      border-radius: 1rem;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    #leaderboard tbody tr:hover {
      transform: scale(1.01);
      background: var(--hover-bg);
    }
    #leaderboard td {
      padding: 1rem 0.8rem;
      font-size: 1rem;
      font-weight: 500;
      text-align: center;
    }
    /* Top 3 row highlights */
    #leaderboard tbody tr.top-1 {
      background: linear-gradient(90deg, rgba(255,215,0,0.25), rgba(255,215,0,0.05));
      border-left: 5px solid #FFD700;
    }
    #leaderboard tbody tr.top-2 {
      background: linear-gradient(90deg, rgba(192,192,192,0.2), rgba(192,192,192,0.05));
      border-left: 5px solid #C0C0C0;
    }
    #leaderboard tbody tr.top-3 {
      background: linear-gradient(90deg, rgba(205,127,50,0.2), rgba(205,127,50,0.05));
      border-left: 5px solid #CD7F32;
    }
    .rank-badge {
      display: inline-block;
      width: 32px;
      height: 32px;
      line-height: 32px;
      border-radius: 50%;
      font-weight: 800;
      background: rgba(255,255,255,0.1);
    }
    tr.top-1 .rank-badge {
      background: #FFD700;
      color: #1e1f2a;
    }
    tr.top-2 .rank-badge {
      background: #C0C0C0;
      color: #1e1f2a;
    }
    tr.top-3 .rank-badge {
      background: #CD7F32;
      color: #1e1f2a;
    }
    #leaderboard td:first-child {
      font-weight: 800;
    }
    #leaderboard td:last-child {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--accent-primary);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><span class="logo-icon">🏏</span> ADPL·2026</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">🏠 Leaderboard</a>
      <a href="pp.html" class="nav-link">👤 Player Profiles</a>
      <a href="pw.html" class="nav-link">🏆 Previous Winners</a>
      <a href="stats.html" class="nav-link">📊 Stats</a>
      <a href="journey.html" class="nav-link">📈 Journey</a>
      <a href="more.html" class="nav-link">📖 More</a>
      <a href="rules.html" class="nav-link">📜 Rules</a>
      <select id="themeSelector" class="theme-selector">
        <option value="green-silver">🌿 Green-Silver</option>
        <option value="red-gold">🔥 Red-Gold</option>
        <option value="blue-black">💙 Blue-Black</option>
        <option value="csk">🟡💙 CSK (Yellow-Blue)</option>
        <option value="mi">🔵🟡 MI (Blue-Gold)</option>
        <option value="rcb">🔴⚫ RCB (Red-Black)</option>
        <option value="kkr">🟣🟡 KKR (Purple-Gold)</option>
        <option value="dc">🔵🔴 DC (Blue-Red)</option>
        <option value="pbks">🔴⚪ PBKS (Red-Silver)</option>
        <option value="rr">🩷🔵 RR (Pink-Blue)</option>
        <option value="srh">🟠⚫ SRH (Orange-Black)</option>
        <option value="lsg">🔵🔴 LSG (Blue-Red)</option>
        <option value="gt">🔵⚪ GT (Blue-Silver)</option>
      </select>
    </div>
  </nav>

  <main class="main-container">
    <!-- Historical selector bar -->
    <div class="selector-bar">
      <div class="current-badge" id="viewModeLabel">🏆 Current Standings (Final)</div>
      <select id="matchSelector" class="date-selector">
        <option value="latest">🏆 Current (after all matches)</option>
      </select>
    </div>

    <div class="stats-panel">
      <div class="live-badge-enhanced"><span class="pulse-dot"></span> LIVE · UPDATED POST MATCH</div>
    </div>
    
    <div class="leaderboard-wrapper">
      <div class="leaderboard-header">
        <h2 class="section-title">🏆 SEASON STANDINGS</h2>
        <div class="leaderboard-sub"></div>
      </div>
      <div class="table-responsive">
        <table id="leaderboard">
          <thead><tr><th>Rank</th><th>Player</th><th>Winner Pts</th><th>MOTM Pts</th><th>Season Pts</th><th>Total</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="league-subtle"></div>
    </div>
    
    <div class="ipl-links">
      <a href="https://www.iplt20.com/points-table/2026" target="_blank" class="ipl-card"><span class="card-emoji">🏆</span><h2>IPL POINTS TABLE</h2></a>
      <a href="https://www.iplt20.com/stats/2026" target="_blank" class="ipl-card"><span class="card-emoji">🏏</span><h2>CAPS LEADERBOARD</h2></a>
    </div>
  </main>
  
  <footer class="footer">
    <div class="footer-content"><span>⚡ Official Partner:</span><a href="https://chat.whatsapp.com/GcFsctnWN2iB9OV8GofVut?mode=gi_t" target="_blank" class="footer-link"><img src="footer.png" alt="Join ADPL Community"></a></div>
    <div class="footer-copyright">© ADPL 2026</div>
  </footer>

  <script>
    // ======================== FIXED LEADERBOARD WITH HISTORICAL SELECTOR ========================
    // This script completely replaces the leaderboard functionality.
    // It uses official totals from 'points' sheet for final standings,
    // and match-by-match accumulation for historical views.
    (function() {
      const sheetId = "14C6hEU0LomlnzIKXzy7DqvfgsAQF0vmNNnDi3BovUOk";
      const pointsURL = `https://opensheet.elk.sh/${sheetId}/points`;
      const matchURL = `https://opensheet.elk.sh/${sheetId}/matches`;
      
      let pointsData = [];      // official final totals per player
      let matchData = [];       // per-match predictions
      let allPlayers = [];
      let officialTotals = {};  // player -> { winner, motm, season, total }
      let uniqueMatchNumbers = [];
      
      const tbody = document.querySelector("#leaderboard tbody");
      const matchSelector = document.getElementById("matchSelector");
      const viewLabel = document.getElementById("viewModeLabel");
      
      function getMatchNumber(matchStr) {
        if (!matchStr) return 999;
        const num = parseInt(matchStr);
        if (!isNaN(num)) return num;
        const match = matchStr.match(/\d+/);
        return match ? parseInt(match[0]) : 999;
      }
      
      // Build official final leaderboard from points sheet (most accurate)
      function getOfficialLeaderboard() {
        const board = [];
        for (let player of allPlayers) {
          const data = officialTotals[player] || { winner: 0, motm: 0, season: 0, total: 0 };
          board.push({
            player: player,
            winner: data.winner,
            motm: data.motm,
            season: data.season,
            total: data.total
          });
        }
        return board.sort((a,b) => b.total - a.total);
      }
      
      // Compute cumulative totals from matches up to a specific match number
      function computeHistoricalLeaderboard(matchLimit) {
        let winnerAcc = {}, motmAcc = {};
        let filteredMatches = matchData;
        if (typeof matchLimit === "number" && !isNaN(matchLimit)) {
          filteredMatches = matchData.filter(m => getMatchNumber(m.Match) <= matchLimit);
        }
        for (let m of filteredMatches) {
          const player = m.Player;
          if (!player) continue;
          winnerAcc[player] = (winnerAcc[player] || 0) + (parseFloat(m.WinnerPoints) || 0);
          motmAcc[player] = (motmAcc[player] || 0) + (parseFloat(m.MOTMPoints) || 0);
        }
        const board = [];
        for (let player of allPlayers) {
          const winner = winnerAcc[player] || 0;
          const motm = motmAcc[player] || 0;
          const season = officialTotals[player]?.season || 0;
          const total = winner + motm + season;
          board.push({ player, winner, motm, season, total });
        }
        return board.sort((a,b) => b.total - a.total);
      }
      
      function renderLeaderboard(leaderboardArray) {
        if (!tbody) return;
        tbody.innerHTML = "";
        if (!leaderboardArray.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No data available</td></tr>';
          return;
        }
        leaderboardArray.forEach((entry, idx) => {
          const rank = idx + 1;
          const row = tbody.insertRow();
          if (rank === 1) row.classList.add("top-1");
          else if (rank === 2) row.classList.add("top-2");
          else if (rank === 3) row.classList.add("top-3");
          
          const rankCell = row.insertCell(0);
          rankCell.innerHTML = `<span class="rank-badge">${rank}</span>`;
          
          const nameCell = row.insertCell(1);
          const link = document.createElement("a");
          link.href = `pp.html?player=${encodeURIComponent(entry.player)}`;
          link.textContent = entry.player;
          link.style.cssText = "color:inherit; text-decoration:none; border-bottom:1px dotted var(--accent-primary);";
          nameCell.appendChild(link);
          
          row.insertCell(2).innerText = Math.round(entry.winner);
          row.insertCell(3).innerText = Math.round(entry.motm);
          row.insertCell(4).innerText = Math.round(entry.season);
          row.insertCell(5).innerText = Math.round(entry.total);
        });
      }
      
      async function populateMatchSelector() {
        if (!matchSelector) return;
        matchSelector.innerHTML = '<option value="latest">🏆 Current (after all matches)</option>';
        if (!uniqueMatchNumbers.length) return;
        uniqueMatchNumbers.sort((a,b) => a - b).forEach(matchNum => {
          const option = document.createElement("option");
          option.value = matchNum;
          option.textContent = `📅 After Match ${matchNum}`;
          matchSelector.appendChild(option);
        });
        const savedMatch = localStorage.getItem("adpl_selected_match_index");
        if (savedMatch && matchSelector.querySelector(`option[value="${savedMatch}"]`)) {
          matchSelector.value = savedMatch;
        } else {
          matchSelector.value = "latest";
        }
      }
      
      async function onMatchChange() {
        const selected = matchSelector.value;
        let leaderboardData;
        if (selected === "latest") {
          leaderboardData = getOfficialLeaderboard();
          viewLabel.innerHTML = "🏆 Current Standings (Final)";
          localStorage.removeItem("adpl_selected_match_index");
        } else {
          const matchNum = parseInt(selected, 10);
          leaderboardData = computeHistoricalLeaderboard(matchNum);
          viewLabel.innerHTML = `📊 Standings after Match ${matchNum}`;
          localStorage.setItem("adpl_selected_match_index", selected);
        }
        renderLeaderboard(leaderboardData);
      }
      
      async function init() {
        try {
          const [pointsRes, matchesRes] = await Promise.all([
            fetch(pointsURL).then(r => r.json()),
            fetch(matchURL).then(r => r.json())
          ]);
          pointsData = pointsRes;
          matchData = matchesRes;
          
          // Build official totals and player list from points sheet
          const playerSet = new Set();
          pointsData.forEach(p => {
            const player = p.Player;
            if (!player) return;
            playerSet.add(player);
            const winner = parseFloat(p.WinnerPts) || 0;
            const motm = parseFloat(p.MOTMPts) || 0;
            const season = parseFloat(p.SeasonPts) || 0;
            const total = winner + motm + season;
            officialTotals[player] = { winner, motm, season, total };
          });
          // Also include players from matches (in case they're missing in points)
          matchData.forEach(m => {
            const player = m.Player;
            if (player && !playerSet.has(player)) {
              playerSet.add(player);
              officialTotals[player] = { winner: 0, motm: 0, season: 0, total: 0 };
            }
          });
          allPlayers = Array.from(playerSet).sort();
          
          // Extract unique match numbers from matchData
          const matchNumbersSet = new Set();
          matchData.forEach(m => {
            const mn = getMatchNumber(m.Match);
            if (mn !== 999) matchNumbersSet.add(mn);
          });
          uniqueMatchNumbers = Array.from(matchNumbersSet);
          
          await populateMatchSelector();
          matchSelector.addEventListener("change", onMatchChange);
          // Initial render (official final standings)
          renderLeaderboard(getOfficialLeaderboard());
        } catch (err) {
          console.error("Leaderboard init error:", err);
          if (tbody) tbody.innerHTML = '<tr><td colspan="6">⚠️ Failed to load data. Check network or sheet permissions.</td></tr>';
        }
      }
      
      init();
    })();
    
    // ========== THEME SELECTOR ==========
    (function() {
      const sel = document.getElementById('themeSelector');
      if (!sel) return;
      const saved = localStorage.getItem('adpl-theme') || 'csk';
      document.documentElement.setAttribute('data-theme', saved);
      sel.value = saved;
      sel.addEventListener('change', (e) => {
        document.documentElement.setAttribute('data-theme', e.target.value);
        localStorage.setItem('adpl-theme', e.target.value);
      });
    })();
  </script>
  <!-- script.js is still loaded but contains a leaderboard block that would overwrite our table.
       We disable it by overriding the leaderboard element check. -->
  <script>
    // Override the leaderboard check in script.js to prevent it from running
    // This ensures our enhanced table stays intact.
    Object.defineProperty(document, 'getElementById', {
      value: function(id) {
        if (id === 'leaderboard' && window._leaderboardOverridden) {
          return null;
        }
        return originalGetElementById.call(document, id);
      },
      configurable: true
    });
    const originalGetElementById = document.getElementById;
    window._leaderboardOverridden = true;
    // Allow our own script to still access leaderboard, but script.js's check will fail
    // Then restore after a short delay to not break other functionality
    setTimeout(() => {
      window._leaderboardOverridden = false;
    }, 500);
  </script>
  <script src="script.js"></script>
  <!-- Final safety: re-trigger change to ensure correct render -->
  <script>
    setTimeout(() => {
      const selector = document.getElementById('matchSelector');
      if (selector && selector.value !== undefined) {
        selector.dispatchEvent(new Event('change'));
      }
    }, 300);
  </script>
</body>
</html>
